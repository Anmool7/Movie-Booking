<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieBook Pro</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== LOGIN / CITY SELECTION ===== -->
<div id="login" class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4 shadow-sm">
        <h3 class="text-center mb-4">Welcome to MovieBook</h3>
        <div class="mb-3">
          <label for="username" class="form-label">Name</label>
          <input type="text" id="username" class="form-control" placeholder="Enter your name">
        </div>
        <div class="mb-3">
          <label for="city" class="form-label">Select City</label>
          <select id="city" class="form-select">
            <option value="Mumbai">Mumbai</option>
            <option value="Delhi">Delhi</option>
            <option value="Bangalore">Bangalore</option>
          </select>
        </div>
        <button class="btn btn-primary w-100" onclick="loginUser()">Login</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== MOVIE SELECTION ===== -->
<div id="movies" class="container mt-5 d-none">
  <h2 class="mb-4 text-center">Movies in <span id="userCity"></span></h2>
  <div class="row" id="movieGrid">
    <!-- Movie cards will be generated here by JS -->
  </div>
</div>

<!-- ===== THEATRE & SHOWTIME ===== -->
<div id="theatre" class="container mt-5 d-none">
  <h3>Select Theatre & Showtime</h3>
  <div class="row" id="theatreGrid">
    <!-- Theatre cards with showtime buttons -->
  </div>
</div>

<!-- ===== SEAT SELECTION ===== -->
<div id="seat" class="container mt-5 d-none text-center">
  <h3>Select Your Seats for <span id="selectedShowName"></span></h3>
  <div id="seatGrid" class="my-4"></div>
  <p id="selectedSeatsText">Selected Seats: None</p>
  <button class="btn btn-success mt-3" onclick="confirmBooking()">Confirm Booking</button>
</div>

<!-- ===== CONFIRMATION ===== -->
<div id="confirm" class="container mt-5 d-none text-center p-5 rounded shadow-lg">
</div>

<!-- JS -->
<script src="script.js"></script>
</body>
</html>
