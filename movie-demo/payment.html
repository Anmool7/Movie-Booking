<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment | MovieBook Pro</title>

    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top custom-navbar">
    <div class="container">

        <a class="navbar-brand logo-text" href="index.html">
            MovieBook
        </a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-center" id="navMenu">

            <ul class="navbar-nav menu-items">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="movies.html">Movies</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="#">Payment</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="bookings.html">My Bookings</a>
                </li>

            </ul>

        </div>

        <div class="user-actions">
            <img src="https://i.pravatar.cc/40" class="avatar">
        </div>

    </div>
</nav>


<!-- ================= PAYMENT SECTION ================= -->
<section class="payment-section">

    <div class="container">

        <div class="row">

            <!-- ================= LEFT SIDE ================= -->
            <div class="col-lg-7">

                <h2 class="section-title">
                    Select Payment Method
                </h2>

                <!-- Payment Tabs -->
                <div class="payment-tabs">

                    <button class="payment-tab active">
                        Card
                    </button>

                    <button class="payment-tab">
                        UPI
                    </button>

                    <button class="payment-tab">
                        Net Banking
                    </button>

                </div>


                <!-- Card Form -->
                <div class="payment-form">

                    <div class="mb-3">

                        <label>Card Holder Name</label>
                        <input type="text" class="form-control payment-input" placeholder="John Doe">

                    </div>

                    <div class="mb-3">

                        <label>Card Number</label>
                        <input type="text" class="form-control payment-input" placeholder="1234 5678 9012 3456">

                    </div>

                    <div class="row">

                        <div class="col-md-6">

                            <label>Expiry Date</label>
                            <input type="text" class="form-control payment-input" placeholder="MM/YY">

                        </div>

                        <div class="col-md-6">

                            <label>CVV</label>
                            <input type="password" class="form-control payment-input" placeholder="123">

                        </div>

                    </div>

                    <button class="btn pay-btn mt-4" onclick="window.location.href='confirmation.html'">
                        Pay ₹400
                    </button>

                </div>

            </div>


            <!-- ================= RIGHT SIDE ================= -->
            <div class="col-lg-5">

                <div class="order-summary">

                    <h4>
                        Order Summary
                    </h4>

                    <!-- Movie Info -->
                    <div class="movie-summary">

                        <img src="https://image.tmdb.org/t/p/w500/qNBAXBIQlnOThrVvA6mA2B5ggV6.jpg">

                        <div>

                            <h5>Avengers Endgame</h5>
                            <p>PVR Cinemas</p>
                            <p>7:30 PM</p>

                        </div>

                    </div>


                    <!-- Seats -->
                    <p class="mt-3">
                        Seats: <strong>B3, B4</strong>
                    </p>


                    <!-- Price Table -->
                    <div class="price-table">

                        <div class="price-row">
                            <span>Ticket Price</span>
                            <span>₹200 x 2</span>
                        </div>

                        <div class="price-row">
                            <span>Convenience Fee</span>
                            <span>₹40</span>
                        </div>

                        <div class="price-row total">
                            <span>Total</span>
                            <span>₹440</span>
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>


<!-- ================= FOOTER ================= -->
<footer class="footer">

    <div class="container text-center">

        <p>
            © 2026 MovieBook Pro. All rights reserved.
        </p>

    </div>

</footer>


<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
