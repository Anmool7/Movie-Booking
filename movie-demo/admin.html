    <!-- CSS -->

<!-- ================= PAGE HEADER ================= -->
<section class="page-header">

    <div class="container">

        <h1 class="page-title">
            Admin Panel
        </h1>

        <p class="page-subtitle">
            Add and manage movies in MovieBook Pro
        </p>

    </div>

</section>


<!-- ================= ADMIN SECTION ================= -->
<section class="admin-section">

    <div class="container">

        <div class="row">

            <!-- ================= ADD MOVIE FORM ================= -->
            <div class="col-lg-5">

                <div class="admin-card">

                    <h3>Add New Movie</h3>

                    <form id="movieForm">

                        <div class="mb-3">
                            <label>Movie Title</label>
                            <input type="text" class="form-control admin-input" placeholder="Enter movie title">
                        </div>

                        <div class="mb-3">
                            <label>Poster Image URL</label>
                            <input type="text" class="form-control admin-input" placeholder="Paste image URL">
                        </div>

                        <div class="mb-3">
                            <label>Genre</label>
                            <input type="text" class="form-control admin-input" placeholder="Action / Drama">
                        </div>

                        <div class="mb-3">
                            <label>Rating</label>
                            <input type="text" class="form-control admin-input" placeholder="8.5">
                        </div>

                        <div class="mb-3">
                            <label>Show Timings</label>
                            <input type="text" class="form-control admin-input" placeholder="10:00, 1:30, 4:00, 7:30">
                        </div>

                        <button class="btn admin-btn">
                            Add Movie
                        </button>

                    </form>

                </div>

            </div>


            <!-- ================= MOVIE LIST ================= -->
            <div class="col-lg-7">

                <div class="admin-card">

                    <h3>Movie List</h3>

                    <div class="admin-movie-list">

                        <!-- Movie Item -->
                        <div class="admin-movie-item">

                            <img src="https://image.tmdb.org/t/p/w500/qNBAXBIQlnOThrVvA6mA2B5ggV6.jpg">

                            <div class="admin-movie-info">

                                <h5>Avengers Endgame</h5>
                                <p>Action • 8.4</p>

                            </div>

                            <div class="admin-actions">

                                <button class="btn edit-btn">
                                    Edit
                                </button>

                                <button class="btn delete-btn">
                                    Delete
                                </button>

                            </div>

                        </div>


                        <!-- Movie Item -->
                        <div class="admin-movie-item">

                            <img src="https://image.tmdb.org/t/p/w500/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg">

                            <div class="admin-movie-info">

                                <h5>Joker</h5>
                                <p>Drama • 8.5</p>

                            </div>

                            <div class="admin-actions">

                                <button class="btn edit-btn">
                                    Edit
                                </button>

                                <button class="btn delete-btn">
                                    Delete
                                </button>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>
